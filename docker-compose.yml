services:
  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - api-data:/app/data
    environment:
      - NODE_ENV=production

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  api-data:
